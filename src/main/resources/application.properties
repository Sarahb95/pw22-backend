# =====================================================================
# FASE 1 — sviluppo locale con H2 in-memory (modalità MySQL).
# I dati vengono ricreati a ogni avvio dagli script in classpath:db/.
#
# Per passare a MySQL/MariaDB: ripristinare il connettore in pom.xml
# e sostituire questo file con application-mysql.properties (vedi README).
# =====================================================================
server.port=8080

# --- DataSource H2 ---------------------------------------------------
spring.datasource.url=jdbc:h2:mem:teatro_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Console H2 (http://localhost:8080/h2-console) -------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate -------------------------------------------------
# Lo schema lo gestiamo noi via schema.sql, JPA non lo modifica.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Esegui schema.sql/data.sql PRIMA che JPA crei l'EntityManager.
spring.jpa.defer-datasource-initialization=true

# --- Inizializzazione SQL --------------------------------------------
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.encoding=UTF-8

# --- Email (Gmail SMTP) ----------------------------------------------
# Sostituire con le proprie credenziali oppure impostare le variabili
# d'ambiente MAIL_USERNAME e MAIL_PASSWORD prima di avviare.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# --- Compressione GZIP -----------------------------------------------
# Collega il concetto di codifica/compressione dati (Architettura dei Calcolatori):
# il payload JSON viene compresso prima della trasmissione → minor banda, minor latenza.
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript,text/xml,text/plain
server.compression.min-response-size=1024

# --- Connection Pool (HikariCP) --------------------------------------
# Throughput applicativo: il pool mantiene connessioni pronte → evita l'overhead
# di apertura TCP+autenticazione a ogni richiesta. Parallelismo fino a 10 thread.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ElisoPool

# --- Logging ---------------------------------------------------------
logging.level.org.springframework=INFO
logging.level.com.teatro=DEBUG
